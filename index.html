<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pencari Kata</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Playfair Display', 'serif'],
            body: ['DM Sans', 'sans-serif'],
          },
          colors: {
            ink: '#1a1a2e',
            paper: '#f5f0e8',
            accent: '#c8843a',
            muted: '#8a8070',
            light: '#e8e0d0',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'DM Sans', sans-serif; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .fade-up { animation: fadeUp 0.5s ease forwards; }
    .spin-slow { animation: spin-slow 3s linear infinite; }

    .word-card {
      animation: fadeUp 0.3s ease forwards;
      opacity: 0;
    }

    input:focus {
      outline: none;
      box-shadow: 0 0 0 2px #c8843a;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #e8e0d0; }
    ::-webkit-scrollbar-thumb { background: #c8843a; border-radius: 3px; }

    .noise-overlay {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.4;
    }

    .deco-line {
      background: linear-gradient(90deg, transparent, #c8843a, transparent);
    }
  </style>
</head>

<body class="bg-paper text-ink min-h-screen relative">

  <div class="noise-overlay"></div>

  <!-- Header -->
  <header class="relative z-10 border-b border-light py-8 px-6">
    <div class="max-w-2xl mx-auto flex items-center justify-between">
      <div>
        <p class="text-xs tracking-[0.3em] text-muted uppercase mb-1">Kamus Bahasa Indonesia</p>
        <h1 class="font-display text-4xl font-black text-ink leading-none">
          Pencari <span class="text-accent">Kata</span>
        </h1>
      </div>
      <!-- Decorative circle -->
      <div class="w-14 h-14 rounded-full border-2 border-accent flex items-center justify-center spin-slow opacity-40">
        <div class="w-2 h-2 rounded-full bg-accent"></div>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="relative z-10 max-w-2xl mx-auto px-6 py-10">

    <!-- Search Box -->
    <div class="bg-white border border-light rounded-2xl p-6 shadow-sm mb-6">

      <div class="grid grid-cols-2 gap-4 mb-5">
        <!-- Huruf Depan -->
        <div>
          <label class="block text-xs font-medium tracking-widest uppercase text-muted mb-2">
            Huruf Depan
          </label>
          <input
            id="depan"
            type="text"
            placeholder="contoh: me"
            class="w-full bg-paper border border-light rounded-xl px-4 py-3 text-ink font-body text-base transition-all duration-200"
            oninput="cari()"
          >
        </div>

        <!-- Huruf Belakang -->
        <div>
          <label class="block text-xs font-medium tracking-widest uppercase text-muted mb-2">
            Huruf Belakang
          </label>
          <input
            id="belakang"
            type="text"
            placeholder="contoh: an"
            class="w-full bg-paper border border-light rounded-xl px-4 py-3 text-ink font-body text-base transition-all duration-200"
            oninput="cari()"
          >
        </div>
      </div>

      <!-- Status Kamus -->
      <div id="kamus-status" class="flex items-center gap-2 text-sm text-muted">
        <div class="w-2 h-2 rounded-full bg-yellow-400 animate-pulse"></div>
        <span>Memuat kamus...</span>
      </div>
    </div>

    <!-- Hasil Count -->
    <div id="jumlah-wrap" class="hidden mb-4">
      <div class="flex items-center gap-3">
        <div class="deco-line h-px flex-1"></div>
        <span id="jumlah" class="text-xs tracking-[0.25em] uppercase font-medium text-muted px-3"></span>
        <div class="deco-line h-px flex-1"></div>
      </div>
    </div>

    <!-- Empty State -->
    <div id="empty-state" class="hidden text-center py-12">
      <div class="text-5xl mb-4">🔍</div>
      <p class="text-muted font-body">Tidak ada kata yang cocok ditemukan.</p>
    </div>

    <!-- Hasil Grid -->
    <div id="hasil" class="grid grid-cols-2 sm:grid-cols-3 gap-2"></div>

    <!-- Loading State -->
    <div id="loading-state" class="text-center py-12">
      <div class="inline-block w-8 h-8 border-2 border-accent border-t-transparent rounded-full animate-spin mb-4"></div>
      <p class="text-muted text-sm">Memuat kamus dari server...</p>
    </div>

  </main>

  <!-- Footer -->
  <footer class="relative z-10 border-t border-light py-5 px-6">
    <div class="max-w-2xl mx-auto flex items-center justify-between">
      <span class="text-xs text-muted tracking-wide">Pencari Kata · Kamus Bahasa Indonesia</span>
      <span id="total-kata" class="text-xs text-muted"></span>
    </div>
  </footer>

  <script>
    let kamus = []
    let sudahCari = false

    // Load kamus dari GitHub
    fetch("https://raw.githubusercontent.com/RehanDias/s0urce/refs/heads/main/daftar_kata_gabungan.txt")
      .then(res => res.text())
      .then(text => {
        kamus = text
          .split("\n")
          .map(k => k.trim().toLowerCase())
          .filter(k => k !== "")

        // Update status
        document.getElementById("loading-state").classList.add("hidden")
        document.getElementById("kamus-status").innerHTML = `
          <div class="w-2 h-2 rounded-full bg-green-500"></div>
          <span>Kamus siap · <strong class="text-ink">${kamus.length.toLocaleString('id-ID')}</strong> kata dimuat</span>
        `
        document.getElementById("total-kata").textContent = kamus.length.toLocaleString('id-ID') + " kata"

        if (sudahCari) cari()
      })
      .catch(() => {
        document.getElementById("loading-state").classList.add("hidden")
        document.getElementById("kamus-status").innerHTML = `
          <div class="w-2 h-2 rounded-full bg-red-500"></div>
          <span class="text-red-500">Gagal memuat kamus. Periksa koneksi internet.</span>
        `
      })

    function cari() {
      sudahCari = true
      if (kamus.length === 0) return

      const depan    = document.getElementById("depan").value.trim().toLowerCase()
      const belakang = document.getElementById("belakang").value.trim().toLowerCase()

      // Jika kedua input kosong, kosongkan hasil
      if (depan === "" && belakang === "") {
        document.getElementById("hasil").innerHTML = ""
        document.getElementById("jumlah-wrap").classList.add("hidden")
        document.getElementById("empty-state").classList.add("hidden")
        return
      }

      const hasil = kamus.filter(kata => {
        const cocokDepan    = depan    === "" || kata.startsWith(depan)
        const cocokBelakang = belakang === "" || kata.endsWith(belakang)
        return cocokDepan && cocokBelakang
      })

      // Tampil jumlah
      const jumlahWrap = document.getElementById("jumlah-wrap")
      const jumlahEl   = document.getElementById("jumlah")
      jumlahWrap.classList.remove("hidden")
      jumlahEl.textContent = hasil.length.toLocaleString('id-ID') + " kata ditemukan"

      // Render kartu kata
      const hasilEl = document.getElementById("hasil")

      if (hasil.length === 0) {
        hasilEl.innerHTML = ""
        document.getElementById("empty-state").classList.remove("hidden")
        return
      }

      document.getElementById("empty-state").classList.add("hidden")

      // Tampilkan maks 300 hasil untuk performa
      const tampil = hasil.slice(0, 300)

      hasilEl.innerHTML = tampil.map((kata, i) => `
        <div
          class="word-card bg-white border border-light rounded-xl px-4 py-3 hover:border-accent hover:bg-amber-50 transition-all duration-150 cursor-default group"
          style="animation-delay: ${Math.min(i * 15, 300)}ms"
        >
          <span class="text-sm font-medium text-ink group-hover:text-accent transition-colors">${hilightKata(kata, depan, belakang)}</span>
        </div>
      `).join("")

      if (hasil.length > 300) {
        hasilEl.innerHTML += `
          <div class="col-span-2 sm:col-span-3 text-center py-4 text-sm text-muted">
            ... dan <strong class="text-ink">${(hasil.length - 300).toLocaleString('id-ID')}</strong> kata lainnya.
            Persempit pencarian untuk melihat semua.
          </div>
        `
      }
    }

    function hilightKata(kata, depan, belakang) {
      let html = kata
      // Highlight depan
      if (depan && kata.startsWith(depan)) {
        html = `<span class="text-accent font-bold">${depan}</span>${kata.slice(depan.length)}`
      }
      // Highlight belakang (dari html yang sudah ada)
      if (belakang && kata.endsWith(belakang)) {
        const plain = kata // gunakan kata asli untuk indexing
        const startIdx = plain.length - belakang.length
        if (depan && startIdx < depan.length) {
          // overlap, skip
        } else {
          const before = kata.slice(0, startIdx)
          const mid = depan ? html.slice(depan.length, startIdx) : html.slice(0, startIdx)
          if (depan) {
            html = `<span class="text-accent font-bold">${depan}</span>${kata.slice(depan.length, startIdx)}<span class="text-accent font-bold">${belakang}</span>`
          } else {
            html = `${kata.slice(0, startIdx)}<span class="text-accent font-bold">${belakang}</span>`
          }
        }
      }
      return html
    }
  </script>

</body>
</html>
